apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - path: jerney-patch.yaml
  - target:
      kind: Application
      name: jerney|platform-secrets|ingress-apps
    patch: |-
      - op: replace
        path: /spec/source/targetRevision
        value: main
  - target:
      kind: Application
      name: prometheus-stack|loki-stack
    patch: |-
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
