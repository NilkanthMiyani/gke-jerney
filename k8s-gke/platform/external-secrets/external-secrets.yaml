# PostgreSQL password → K8s Secret "jerney-db-credentials" in namespace "jerney"
# Referenced by jerney Helm chart via postgresql.auth.existingSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jerney-db-credentials
  namespace: jerney
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: jerney-db-credentials
  data:
    - secretKey: password
      remoteRef:
        key: jerney-postgres-password
---
# Grafana admin password → K8s Secret "jerney-grafana-credentials" in namespace "monitoring"
# Referenced by prometheus-stack via grafana.admin.existingSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jerney-grafana-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: jerney-grafana-credentials
  data:
    - secretKey: admin-password
      remoteRef:
        key: jerney-grafana-admin-password
---
# Alertmanager SMTP key → K8s Secret "alertmanager-smtp-key" in namespace "monitoring"
# Referenced by prometheus-stack alertmanager config via smtp_auth_password_file mount
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp-key
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-smtp-key
  data:
    - secretKey: smtp_auth_password
      remoteRef:
        key: jerney-alertmanager-smtp-key
