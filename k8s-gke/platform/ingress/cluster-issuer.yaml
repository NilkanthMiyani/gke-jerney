# ==============================================================
# cert-manager ClusterIssuer — Let's Encrypt (production)
#
# Replaces GCP Certificate Manager used by the GKE Gateway.
# Uses HTTP01 challenge via NGINX Ingress — cert-manager creates
# a temporary Ingress for the ACME validation path.
# ==============================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: miyaninilkanth2@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
